"Outillage Industriel",title:"OneTech Tools — Équipements de Peinture Professionnels",desc:"Catalogue e-commerce international pour un fabricant d'outillage de peinture et de finition industrielle : pistolets, ponceuses, polisseuses et stations de préparation pensés pour les ateliers et lignes de production. Navigation par secteur d'activité, fiches techniques détaillées et parcours d'achat pensé pour les professionnels exigeants.",features:["Catalogue produits multi-catégories","Fiches techniques détaillées","Navigation par secteur d'activité","Parcours d'achat B2B optimisé"]},{label:"Mode Masculine",title:"Paul Fredrick — Chemises & Costumes Haut de Gamme",desc:"Boutique en ligne américaine dédiée à la mode masculine classique : chemises sur-mesure, costumes, blazers et accessoires. Mise en avant des collections saisonnières, filtres de coupe précis et garantie satisfaction pour une expérience d'achat premium.",features:["Filtrage avancé par coupe et taille","Mise en avant des nouveautés","Garantie satisfaction affichée","Design élégant et intemporel"]},{label:"Chocolaterie de Luxe",title:"Graines de Chocolat — Chocolaterie Artisanale",desc:"Vitrine gourmande pour une chocolaterie artisanale de luxe à Rabat : coffrets personnalisables, tablettes aromatisées et créations pour chaque occasion. Univers visuel raffiné, mise en scène soignée des produits et parcours pensé pour les cadeaux d'entreprise comme pour les particuliers.",features:["Coffrets cadeaux personnalisables","Présentation photo haut de gamme","Sélection par occasion","Univers de marque raffiné"]},{label:"Thés Biologiques",title:"Two Leaves Tea — Thés Bio Premium",desc:"Site e-commerce pour une marque américaine de thé biologique et équitable : sachets pleine feuille, matcha et infusions classées par saveur et par occasion. Mise en avant des valeurs durables de la marque, fiches produits immersives et découverte facilitée par ambiance.",features:["Navigation par ambiance / occasion","Fiches produits immersives","Mise en avant du sourcing durable","Programme de fidélité intégré"]},{label:"Mode Enfant Seconde Main",title:"Elsa & Paul — Mode Enfant en Seconde Main",desc:"Boutique en ligne française spécialisée dans la mode de seconde main pour enfants de 0 à 6 ans. Plus de 1000 pièces sélectionnées avec soin, filtres par âge, saison et marque, pour une expérience shopping responsable, économique et sans compromis sur le style.",features:["Plus de 1000 pièces sélectionnées","Filtres par âge, saison et marque","Démarche éco-responsable","Livraison rapide sous 48-72h"]}]},faq:{label:"Questions fréquentes",title:"Les réponses à vos questions",items:[{q:"Combien de temps faut-il pour créer une boutique en ligne ?",a:"La création d'une boutique en ligne prend généralement entre 2 et 6 semaines selon le nombre de produits, les fonctionnalités souhaitées et les personnalisations. Nous avançons rapidement tout en garantissant un résultat professionnel, performant et prêt à vendre."},{q:"Est-ce que je peux vous confier entièrement mon projet sans connaissances techniques ?",a:"Oui, absolument. Nous prenons en charge votre projet de A à Z : conception, design, catalogue produits, paiements, livraison, mise en ligne et accompagnement. Vous n'avez besoin d'aucune compétence technique."},{q:"Puis-je demander des modifications si la boutique ne me plaît pas ?",a:"Bien sûr. Nous travaillons avec vous à chaque étape et incluons des ajustements afin que votre boutique corresponde parfaitement à vos attentes. Votre satisfaction est notre priorité."},{q:"Est-ce que ma boutique sera optimisée pour mobile ?",a:"Oui, toutes nos boutiques sont entièrement responsive. Vos clients bénéficient d'une expérience d'achat fluide sur smartphone, tablette et ordinateur."},{q:"Est-ce que ma boutique sera bien référencée sur Google ?",a:"Oui. Nous optimisons chaque boutique pour le référencement naturel (SEO) : structure, vitesse, fiches produits, catégories et bonnes pratiques afin d'améliorer votre visibilité sur Google et d'attirer davantage de clients."},{q:"Gérez-vous les paiements, l'hébergement et le nom de domaine ?",a:"Oui, nous nous occupons de tout : configuration des paiements sécurisés, réservation du nom de domaine, hébergement, mise en ligne et paramétrage complet de votre boutique. Vous recevez une solution clé en main, prête à vendre."},{q:"Pouvez-vous installer la boutique sur mon compte Shopify ou gérer toute la mise en ligne ?",a:"Oui. Nous pouvons créer et installer votre boutique directement sur votre compte Shopify, configurer votre nom de domaine, les paiements, les options de livraison, les taxes et tous les paramètres essentiels. Si vous n'avez pas encore de compte, nous vous accompagnons également dans sa création afin que votre boutique soit prête à vendre dès sa mise en ligne."}]},pricing:{label:"Tarifs",title:"Choisissez la formule qui vous correspond",plans:[{badge:"🟢 Essentiel",price:"À partir de 900 CHF",priceNote:"Pour lancer votre boutique",features:["Jusqu'à 20 produits","Design moderne et professionnel","Paiement sécurisé","Version mobile responsive","Mise en ligne incluse"],note:"👉 Idéal pour commencer à vendre en ligne rapidement."},{badge:"🔵 Standard",price:"À partir de 1500 CHF",priceNote:"L'équilibre idéal",features:["Jusqu'à 100 produits","Design personnalisé","Optimisation SEO de base","Gestion des paiements et des livraisons","Site rapide et responsive"],note:"👉 Le meilleur équilibre entre performance, évolutivité et budget."},{badge:"🟣 Premium",price:"À partir de 2500 CHF",priceNote:"Pour développer votre activité",features:["Design sur mesure haut de gamme","Produits illimités","Animations et interactions avancées","Optimisation SEO avancée","Expérience d'achat optimisée pour la conversion","Fonctionnalités e-commerce avancées (variantes, filtres, promotions, avis clients, etc.)"],note:"👉 Pour créer une boutique en ligne performante, évolutive et conçue pour maximiser vos ventes."}],disclaimerTitle:"Mention importa  curated pieces","Filters by age, season & brand","Eco-responsible approach","Fast 48-72h delivery"]}]},faq:{label:"Frequently asked",title:"Answers to your questions",items:[{q:"How long does it take to build an online store?",a:"Most online stores go live in 2 to 6 weeks, depending on your catalogue size, the features you need and the level of customisation. We move fast without compromising on a polished, high-performing, ready-to-sell result."},{q:"Can I hand the whole project over to you without any technical skills?",a:"Absolutely. We handle everything end to end: strategy, design, product catalogue, payments, shipping, launch and ongoing support. No technical knowledge required on your side."},{q:"Can I ask for changes if I'm not happy with the store?",a:"Of course. We work with you at every step and include revisions so the store truly matches what you had in mind. Your satisfaction is the priority."},{q:"Will my store be optimised for mobile?",a:"Yes. Every store we build is fully responsive so your customers get a smooth shopping experience on phone, tablet and desktop."},{q:"Will my store rank well on Google?",a:"Yes. We optimise every store for SEO: structure, speed, product pages, categories and best practices, so you gain visibility on Google and attract more customers."},{q:"Do you handle payments, hosting and the domain name?",a:"Yes, we take care of the lot: secure payment setup, domain registration, hosting, launch and the full configuration of your store. You get a turnkey solution, ready to sell."},{q:"Can you install the store on my Shopify account or manage the whole launch?",a:"Yes. We can build and install your store directly on your Shopify account, set up your domain, payments, shipping options, taxes and every core setting. Don't have a Shopify account yet? We'll walk you through creating one so your store is ready to sell from day one."}]},pricing:{label:"Pricing",title:"Pick the plan that fits you",plans:[{badge:"🟢 Essential",price:"From ie","Auswahl nach Anlass","Edle Markenwelt"]},{label:"Bio-Tee",title:"Two Leaves Tea — Premium Bio-Tee",desc:"E-Commerce-Website einer amerikanischen Bio- und Fairtrade-Teemarke: Ganzblatt-Sachets, Matcha und Aufgüsse, sortiert nach Geschmack und Anlass. Die Nachhaltigkeitsgeschichte der Marke im Mittelpunkt, immersive Produktseiten und einfache Entdeckung nach Stimmung.",features:["Navigation nach Stimmung/Anlass","Immersive Produktseiten","Nachhaltige Herkunft im Fokus","Integriertes Treueprogramm"]},{label:"Second-Hand Kindermode",title:"Elsa & Paul — Second-Hand Kindermode",desc:"Französischer Online-Shop für Second-Hand-Mode für Kinder von 0 bis 6 Jahren. Über 1.000 sorgfältig ausgewählte Teile, Filter nach Alter, Saison und Marke, für ein verantwortungsvolles, preisbewusstes Einkaufserlebnis ohne Stilverzicht.",features:["Über 1.000 ausgewählte Teile","Filter nach Alter, Saison & Marke","Nachhaltiger Ansatz","Schnelle Lieferung in 48-72 Std."]}]},faq:{label:"Häufige Fragen",title:"Antworten auf Ihre Fragen",items:[{q:"Wie lange dauert die Erstellung eines Online-Shops?",a:"Ein Online-Shop ist in der Regel in 2 bis 6 Wochen online — je nach Sortimentsgröße, Funktionsumfang und Individualisierung. Wir arbeiten zügig, ohne Abstriche bei Qualität, Performance und Verkaufsbereitschaft zu machen."},{q:"Kann ich Ihnen das Projekt ohne technische Kenntnisse komplett übergeben?",a:"Ja, selbstverständlich. Wir übernehmen alles: Konzept, Design, Produktkatalog, Zahlungen, Versand, Go-Live und Betreuung. Sie brauchen keinerlei technisches Know-how."},{q:"Kann ich Änderungen wünschen, wenn mir der Shop nicht gefällt?",a:"Natürlich. Wir binden Sie in jeden Schritt ein und arbeiten Anpassungen ein, bis der Shop wirklich zu Ihnen passt. Ihre Zufriedenheit steht an erster Stelle."},{q:"Wird mein Shop für mobile Geräte optimiert?",a:"Ja. Alle unsere Shops sind vollständig responsive — Ihre Kundschaft kauft auf Smartphone, Tablet und Desktop gleichermaßen komfortabel ein."},{q:" /* === Lovable unified IP dial-code detection (identical logic on all pages) === */
(function(){
  function selectByCountry(cc){
    var dial = document.getElementById('dialCode');
    if (!dial || !cc) return false;
    cc = String(cc).toUpperCase();
    var opt = dial.querySelector('option[data-country="'+cc+'"]')
           || dial.querySelector('option[data-iso="'+cc+'"]');
    if (opt){ dial.value = opt.value; try{ dial.dispatchEvent(new Event('change',{bubbles:true})); }catch(e){} return true; }
    return false;
  }
  function selectByDial(code){
    var dial = document.getElementById('dialCode');
    if (!dial || !code) return false;
    code = String(code); if (code.charAt(0)!=='+') code = '+' + code.replace(/^\+/,'');
    for (var i=0;i<dial.options.length;i++){
      if (dial.options[i].value === code){ dial.value = code; try{ dial.dispatchEvent(new Event('change',{bubbles:true})); }catch(e){} return true; }
    }
    return false;
  }
  function applyFallback(){
    var dial = document.getElementById('dialCode');
    if (dial && !dial.value) dial.value = '+41';
  }
  function tryProvider(url, extract){
    return fetch(url).then(function(r){ return r.ok ? r.json() : Promise.reject(new Error('http')); }).then(function(data){
      var info = extract(data);
      if (!info) throw new Error('no-data');
      if (selectByCountry(info.country)) return true;
      if (selectByDial(info.dial)) return true;
      throw new Error('no-match');
    });
  }
  function detect(){
    var dial = document.getElementById('dialCode');
    if (!dial) return;
    applyFallback();
    tryProvider('https://ipapi.co/json/', function(d){

    }).catch(function(){
      return tryProvider('https://ipwho.is/', function(d){

<script>
/* AJAX FormSubmit — pas de redirection, l'utilisateur reste sur la page */
(function(){
  document.addEventListener('submit', function(e){
    var form = e.target;
    if (!form || form.id !== 'contactForm') return;
    if (!form.action || form.action.indexOf('formsubmit.co') === -1) return;
    e.preventDefault();
    var btn = document.getElementById('submitBtn');
    var status = document.getElementById('formStatus');
    var originalText = btn ? btn.textContent : '';
    setTimeout(function(){
      var data = new FormData(form);
      if (btn) btn.disabled = true;
      fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      })
        .then(function(r){ if (!r.ok) throw new Error('net'); return r.json().catch(function(){ return {}; }); })
        .then(function(){
          if (status) {
            status.className = 'form-status ok';
            status.innerHTML = '\u2705 Votre message a \u00e9t\u00e9 envoy\u00e9 avec succ\u00e8s.<br>Nous vous r\u00e9pondrons sous 24 heures.';
          }
          form.reset();
        })
        .catch(function(){
          if (status) {
            status.className = 'form-status err';
            status.textContent = '\u274c Une erreur est survenue. Veuillez r\u00e9essayer.';
          }
        })
        .then(function(){
          if (btn) { btn.disabled = false; btn.textContent = originalText; }
        });
    }, 0);
  }, true);
})();
</script>
