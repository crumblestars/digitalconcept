const LANGS = [
  { code:"fr", label:"Français", flag:"🇫🇷" },
  { code:"en", label:"English",  flag:"🇬🇧" },
  { code:"de", label:"Deutsch",  flag:"🇩🇪" },
  { code:"es", label:"Español",  flag:"🇪🇸" },
  { code:"it", label:"Italiano", flag:"🇮🇹" },
];
const AVAILABLE = LANGS.map(l => l.code);

function detectLang() {
  const saved = localStorage.getItem("lang");
  if (saved && AVAILABLE.includes(saved)) return saved;
  const nav = (navigator.language || "en").slice(0,2).toLowerCase();
  return AVAILABLE.includes(nav) ? nav : "en";
}

AGB.es = {

    { h:"Ámbito de aplicación", b:[

    ]},
    { h:"Servicios", b:[
      "El Prestador ofrece, entre otros, los siguientes servicios:",
      { list:["Concepción, diseño y desarrollo de sitios web a medida","Implementación técnica de proyectos web","Diseño UI/UX","Automatizaciones y soluciones de procesos digitales","Servicios IT y digitales individuales según acuerdo"]},
      "El alcance exacto se define exclusivamente en el presupuesto correspondiente o en un acuerdo escrito."

      "Son válidos los precios del presupuesto correspondiente.",

    { h:"Condiciones de pago", b:[

    { h:"Contenidos del Cliente", b:[
      "El Cliente es el único responsable de los contenidos aportados.",
      "Garantiza especialmente que no se vulneran derechos de autor, marcas, derechos de la personalidad ni otros derechos de terceros.",
      "El Prestador declina toda responsabilidad al respecto."

      "Durante el proyecto pueden presentarse avances.",
      "Las solicitudes de modificación deben comunicarse, en la medida de lo posible, de manera agrupada."

    { h:"Correcciones", b:[
      "Salvo pacto en contrario, la oferta incluye <strong>dos rondas de correcciones</strong>.",

      "Los retrasos por causa de fuerza mayor, problemas técnicos o falta de colaboración del Cliente prolongan el plazo de forma razonable."

      "Se excluye la responsabilidad por daños indirectos, daños consecuentes, lucro cesante, pérdida de datos o interrupciones del negocio.",
      "En particular, el Prestador no responde por daños derivados de:",
      { list:["caídas de hosting o servidor,","problemas de dominio,","actualizaciones de navegador o software,","vulnerabilidades de software de terceros,","plugins o extensiones de terceros,","cambios realizados por el Cliente o terceros,","ataques informáticos, malware o ciberataques,","fuerza mayor."]}
    ]},
    { h:"Confidencialidad", b:["Ambas partes se comprometen a mantener la confidencialidad de la información sensible y a utilizarla únicamente para la ejecución del contrato."]},
    { h:"Derecho de referencia", b:["El Prestador puede presentar los proyectos finalizados mencionando el nombre del Cliente, con capturas o enlaces, como referencia en su propio sitio o en materiales de marketing, salvo oposición escrita del Cliente antes del inicio del proyecto."]},
    { h:"Protección de datos", b:[
      "Los datos personales se tratan conforme a la Ley Federal Suiza de Protección de Datos (LPD).",
      "Puede consultar más información en la política de privacidad."
    ]},
    { h:"Rescisión", b:[
      "Los encargos permanentes o servicios recurrentes pueden rescindirse por escrito por cualquiera de las partes con un preaviso de 30 días a fin de mes, salvo pacto en contrario.",
      "Las prestaciones ya realizadas siguen siendo debidas."

    { h:"Cláusula de salvaguardia", b:["Si alguna disposición de estas CG resultara total o parcialmente nula, la validez de las restantes disposiciones no se verá afectada."]},
    { h:"Modificaciones de las CG", b:[

let currentLang = detectLang();

function renderArticle(lang) {
  const data = AGB[lang] || AGB.de;
  const html = data.sections.map((s,i) => {
    const num = String(i+1).padStart(2,"0");
    const body = s.b.map(item => {
      if (typeof item === "string") return `<p>${item}</p>`;
      if (item.list) return `<ul>${item.list.map(li => `<li>${li}</li>`).join("")}</ul>`;
      return "";
    }).join("");
    return `<section><h2><span class="num">${num}</span>${s.h}</h2>${body}</section>`;
  }).join('<div class="divider" style="margin:36px 0"></div>');
  document.getElementById("agb").innerHTML = html;
}

function applyLanguage(lang) {
  if (!AVAILABLE.includes(lang)) lang = "en";
  currentLang = lang;
  localStorage.setItem("lang", lang);
  const t = UI[lang];
  const meta = (AGB[lang] || AGB.de).meta;

  document.documentElement.lang = lang;
  document.title = meta.title;
  const md = document.querySelector('meta[name="description"]');
  if (md) md.setAttribute("content", meta.description);

  document.querySelectorAll("[data-i18n]").forEach(el => {
    const keys = el.getAttribute("data-i18n").split(".");
    let v = t; for (const k of keys) v = v && v[k];
    if (typeof v === "string") el.textContent = v;
  });
  document.querySelectorAll("[data-i18n-html]").forEach(el => {
    const keys = el.getAttribute("data-i18n-html").split(".");
    let v = t; for (const k of keys) v = v && v[k];
    if (typeof v === "string") el.innerHTML = v;
  });
  document.querySelectorAll("[data-i18n-attr-aria-label]").forEach(el => {
    const keys = el.getAttribute("data-i18n-attr-aria-label").split(".");
    let v = t; for (const k of keys) v = v && v[k];
    if (typeof v === "string") el.setAttribute("aria-label", v);
  });

  renderArticle(lang);

  const cur = document.getElementById("langCurrent");
  if (cur) cur.textContent = lang.toUpperCase();
  document.querySelectorAll("#langMenu button[data-lang]").forEach(b => {
    b.classList.toggle("active", b.getAttribute("data-lang") === lang);
  });
}

function renderLangMenu() {
  const menu = document.getElementById("langMenu");
  if (!menu) return;
  menu.innerHTML = LANGS.map(l => `
    <li><button type="button" data-lang="${l.code}" class="${l.code === currentLang ? "active" : ""}">
      <span>${l.flag} ${l.label}</span><span class="check">✓</span>
    </button></li>`).join("");
  menu.querySelectorAll("button[data-lang]").forEach(b => {
    b.addEventListener("click", () => {
      applyLanguage(b.getAttribute("data-lang"));
      renderLangMenu();
      document.getElementById("langSwitcher").classList.remove("open");
      document.getElementById("langTrigger").setAttribute("aria-expanded","false");
    });
  });
}

document.addEventListener("DOMContentLoaded", () => {
  renderLangMenu();
  applyLanguage(currentLang);

  const trigger = document.getElementById("langTrigger");
  const switcher = document.getElementById("langSwitcher");
  trigger.addEventListener("click", () => {
    const open = switcher.classList.toggle("open");
    trigger.setAttribute("aria-expanded", open ? "true" : "false");
  });
  document.addEventListener("click", e => {
    if (!switcher.contains(e.target)) {
      switcher.classList.remove("open");
      trigger.setAttribute("aria-expanded", "false");
    }
  });

  /* Sync when localStorage.lang changes in another tab (e.g. main site) */
  window.addEventListener("storage", e => {
    if (e.key === "lang" && e.newValue && AVAILABLE.includes(e.newValue) && e.newValue !== currentLang) {
      applyLanguage(e.newValue);
      renderLangMenu();
    }
  });

  /* Navbar hide-on-scroll (mêmes réglages que le site) */
  const nav = document.getElementById("navbar");
  let lastY = window.scrollY;
  window.addEventListener("scroll", () => {
    const y = window.scrollY;
    if (y > lastY && y > 120) nav.classList.add("nav-hidden");
    else nav.classList.remove("nav-hidden");
    lastY = y;
    /* Back-to-top */
    document.getElementById("toTop").classList.toggle("show", y > 500);
  }, { passive:true });

  document.getElementById("toTop").addEventListener("click", () => {
    window.scrollTo({ top:0, behavior:"smooth" });
  });
});
</script>
