<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Portfolio Sites Vitrines — WebStudio</title>
<meta name="description" content="Découvrez notre portfolio de sites vitrines réalisés sur mesure : design moderne, performance et identité unique." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>


*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --navy: #010b18; --electric: #0ff; --white: #f5f7fa; --accent: #0abde3; }

html { scroll-behavior: smooth; }
body {
  font-family: 'Montserrat', system-ui, sans-serif;
  background: var(--navy);
  color: var(--white);
  overflow-x: hidden;
  cursor: none;
}


#bg-matrix-canvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
#bg-spotlight     { position: fixed; inset: 0; z-index: 1; pointer-events: none; background: rgba(1,11,24,0.93); }
#bg-plexus        { position: fixed; inset: 0; z-index: 2; pointer-events: none; }
#bg-scanlines     { position: fixed; inset: 0; z-index: 3; pointer-events: none; background: repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px); }
#bg-vignette      { position: fixed; inset: 0; z-index: 4; pointer-events: none; background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(1,11,24,.55) 100%); }


#cursor     { position: fixed; pointer-events: none; z-index: 9999; mix-blend-mode: screen; }
#cursor-dot { width:6px; height:6px; background:var(--electric); border-radius:50%; position:absolute; transform:translate(-50%,-50%); box-shadow:0 0 8px var(--electric),0 0 20px var(--electric); }
#cursor-ring{ width:38px; height:38px; border:1px solid rgba(0,255,255,.35); border-radius:50%; position:absolute; transform:translate(-50%,-50%); }


#navbar {
  position:fixed; inset:0 0 auto 0; z-index:1000; padding:20px 40px;
  transition:transform .45s cubic-bezier(.4,0,.2,1);
}
#navbar.nav-hidden { transform:translateY(-100%); }
#navbar nav { display:flex; align-items:center; max-width:1200px; margin:0 auto; }
.nav-pill {
  display:flex; align-items:center; height:48px; padding:0 24px;
  border-radius:999px; background:rgba(10,20,36,0.8); border:1px solid rgba(0,255,255,0.2);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  text-decoration:none; transition:border-color .2s;
}
.nav-pill:hover { border-color:rgba(0,255,255,0.4); }
.nav-line { flex:1; height:1px; background:linear-gradient(90deg, rgba(0,255,255,0.3), rgba(0,255,255,0.1), rgba(0,255,255,0.3)); margin:0 8px; }
#navbar .logo { font-family:'DM Serif Display',serif; font-size:20px; letter-spacing:1px; color:var(--white); }
#navbar .logo span { font-style:italic; color:var(--electric); text-shadow:0 0 20px rgba(0,255,255,0.4); }
#navbar .logo-img { height:32px; width:auto; display:block; filter:drop-shadow(0 0 20px rgba(0,255,255,0.4)); }
.nav-links { gap:28px; }
.nav-links a { color:rgba(245,247,250,0.75); text-decoration:none; font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase; transition:color .2s; white-space:nowrap; }
.nav-links a:hover { color:var(--electric); }


.lang-switcher { position:relative; font-family:'Montserrat',sans-serif; }
.lang-trigger {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(10,20,36,0.8); border:1px solid rgba(0,255,255,0.2);
  color:var(--white); padding:0 20px; height:48px; border-radius:999px;
  font-size:12px; font-weight:600; letter-spacing:1.5px; text-transform:uppercase;
  cursor:pointer; transition:border-color .2s;
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  font-family:inherit;
}
.lang-trigger:hover { border-color:rgba(0,255,255,0.4); }
.lang-trigger .caret { transition:transform .25s ease; display:inline-block; font-size:10px; opacity:.7; }
.lang-trigger[aria-expanded="true"] .caret { transform:rotate(180deg); }
.lang-menu {
  position:absolute; top:calc(100% + 10px); right:0; min-width:180px;
  background:rgba(10,20,36,0.92); border:1px solid rgba(0,255,255,0.18);
  border-radius:14px; padding:8px; list-style:none;
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  box-shadow:0 12px 40px rgba(0,0,0,0.55), 0 0 24px rgba(0,255,255,0.08);
  opacity:0; transform:translateY(-6px) scale(.98); pointer-events:none;
  transition:opacity .18s ease, transform .22s cubic-bezier(.2,.9,.3,1.4);
  z-index:1001;
}
.lang-switcher.open .lang-menu { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
.lang-menu li { margin:0; }
.lang-menu button {
  display:flex; align-items:center; justify-content:space-between; gap:10px;
  width:100%; background:none; border:none; padding:10px 14px; border-radius:10px;
  color:rgba(245,247,250,0.78); font-family:inherit; font-size:13px; font-weight:500;
  cursor:pointer; text-align:left; transition:background .15s, color .15s;
}
.lang-menu button:hover { background:rgba(0,255,255,0.08); color:var(--white); }
.lang-menu button.active { color:var(--electric); }
.lang-menu button .check { opacity:0; font-size:12px; color:var(--electric); }
.lang-menu button.active .check { opacity:1; }


section { position:relative; z-index:10; background:transparent; }
.section-inner { max-width:1140px; margin:0 auto; padding:110px 32px; }
.section-label { font-size:11px; letter-spacing:3.5px; text-transform:uppercase; color:var(--electric); margin-bottom:14px; }
.section-title { font-family:'DM Serif Display',serif; font-size:clamp(28px,4vw,46px); line-height:1.18; color:var(--white); margin-bottom:56px; }


#hero { min-height:100vh; display:flex; align-items:center; justify-content:center; text-align:center; padding-top:80px; }
.hero-content { max-width:860px; padding:0 24px; animation:heroFadeIn 1.2s ease forwards; }
@keyframes heroFadeIn { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }
.hero-tag { display:inline-block; font-size:11px; letter-spacing:3px; text-transform:uppercase; color:var(--electric); border:1px solid rgba(0,255,255,0.3); padding:6px 18px; border-radius:30px; margin-bottom:28px; background:rgba(0,255,255,0.05); backdrop-filter:blur(4px); }
.hero-title { font-family:'DM Serif Display',serif; font-size:clamp(36px,6vw,72px); line-height:1.12; color:var(--white); margin-bottom:22px; text-shadow:0 2px 40px rgba(0,0,0,0.5); }
.hero-title em { font-style:italic; color:var(--electric); text-shadow:0 0 30px rgba(0,255,255,0.4); }
.hero-subtitle { font-size:clamp(14px,1.8vw,18px); color:rgba(245,247,250,0.72); line-height:1.7; max-width:620px; margin:0 auto 44px; }
.hero-scroll { display:flex; align-items:center; gap:10px; justify-content:center; color:rgba(245,247,250,0.4); font-size:12px; letter-spacing:2px; text-transform:uppercase; animation:bounce 2s infinite; }
.hero-scroll svg { width:20px; height:20px; }
@keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(6px)} }


.divider { height:1px; background:linear-gradient(90deg,transparent,rgba(0,255,255,0.15),transparent); }



.mockup-pc-screen video.mk-video,
.mockup-phone-screen video.mk-video { width:100%; height:100%; object-fit:cover; object-position:top; display:block; background:#000; opacity:0; transition:opacity .5s ease; }
.mockup-pc-screen video.mk-video.ready,
.mockup-phone-screen video.mk-video.ready { opacity:1; }
.scroll-frame { position:absolute; inset:0; overflow:hidden; background:#fff; border-radius:inherit; }
.mockup-pc-screen .scroll-frame, .mockup-phone-screen .scroll-frame { position:relative; width:100%; height:100%; }
.scroll-img { display:block; width:100%; height:auto; transform:translate3d(0,0,0); will-change:transform; }
@keyframes wsPortfolioScroll {
  0%   { transform: translate3d(0, 0, 0); }
  2.5% { transform: translate3d(0, 0, 0); }
  100% { transform: translate3d(0, var(--scroll-max, 0px), 0); }
}
.scroll-img.play { animation: wsPortfolioScroll 40s cubic-bezier(0.42, 0, 0.58, 1) infinite; }
.scroll-img.paused { animation-play-state: paused; }


.portfolio-row { display:grid; grid-template-columns:1fr 1fr; gap:64px; align-items:center; margin-bottom:140px; }
.portfolio-row.reverse .portfolio-text { order:2; }
.portfolio-row.reverse .portfolio-mockup { order:1; }
.portfolio-text .section-label { margin-bottom:14px; }
.portfolio-text .portfolio-title { font-family:'DM Serif Display',serif; font-size:clamp(28px,3.4vw,42px); line-height:1.15; color:var(--white); margin-bottom:20px; }
.portfolio-text .portfolio-desc { font-size:15px; color:rgba(245,247,250,0.65); line-height:1.75; margin-bottom:26px; }
.portfolio-text ul { list-style:none; padding:0; margin:0 0 32px; }
.portfolio-text ul li { font-size:14px; color:rgba(245,247,250,0.78); padding:8px 0 8px 28px; position:relative; }
.portfolio-text ul li::before { content:''; position:absolute; left:0; top:14px; width:14px; height:8px; border-left:2px solid var(--electric); border-bottom:2px solid var(--electric); transform:rotate(-45deg); }
.btn-visit { display:inline-flex; align-items:center; gap:10px; background:linear-gradient(135deg,#0abde3,#007baf); color:#fff; font-weight:700; font-size:14px; letter-spacing:1.2px; text-transform:uppercase; padding:14px 32px; border-radius:50px; text-decoration:none; box-shadow:0 4px 24px rgba(10,189,227,0.32); transition:opacity .2s,transform .2s; }
.btn-visit:hover { opacity:.88; transform:translateY(-2px); }
.btn-visit svg { width:14px; height:14px; }

.portfolio-mockup { position:relative; width:100%; aspect-ratio: 1.15 / 1; max-width:560px; margin:0 auto; }
.mockup-pc { position:absolute; top:6%; left:0; width:92%; background:#0a1828; border:1px solid rgba(0,255,255,0.18); border-radius:14px; padding:22px 14px 14px; box-shadow:0 30px 80px rgba(0,0,0,0.55), 0 0 50px rgba(0,255,255,0.06); }
.mockup-pc::before { content:''; position:absolute; top:8px; left:14px; width:8px; height:8px; border-radius:50%; background:#ff5f56; box-shadow:14px 0 0 #ffbd2e, 28px 0 0 #27c93f; }
.mockup-pc-screen { width:100%; aspect-ratio: 16/10; border-radius:6px; overflow:hidden; background:#000; }
.mockup-pc-stand { position:absolute; bottom:-22px; left:50%; transform:translateX(-50%); width:34%; height:14px; background:linear-gradient(180deg,#0e1f33,#06101e); border-radius:0 0 12px 12px; border:1px solid rgba(0,255,255,0.12); border-top:none; }
.mockup-phone { position:absolute; bottom:-4%; right:-2%; width:30%; background:#0a1828; border:1px solid rgba(0,255,255,0.22); border-radius:22px; padding:8px 6px; box-shadow:0 24px 60px rgba(0,0,0,0.65), 0 0 40px rgba(0,255,255,0.1); z-index:2; }
.mockup-phone::before { content:''; position:absolute; top:8px; left:50%; transform:translateX(-50%); width:36%; height:6px; background:#000; border-radius:4px; }
.mockup-phone-screen { width:100%; aspect-ratio: 9/19; border-radius:14px; overflow:hidden; background:#000; margin-top:14px; }
.mockup-pc-screen video, .mockup-phone-screen video, .mockup-pc-screen .fill, .mockup-phone-screen .fill { width:100%; height:100%; object-fit:cover; object-position:top; display:block; background:#000; }

@media (max-width:880px) {
  .portfolio-row { grid-template-columns:1fr; gap:48px; margin-bottom:96px; }
  .portfolio-row .portfolio-text { order:0 !important; }
  .portfolio-row .portfolio-mockup { order:1 !important; }
  .portfolio-mockup { max-width:420px; }
}


.faq-list { max-width:820px; margin:0 auto; }
.faq-item { border:1px solid rgba(0,255,255,0.12); background:rgba(255,255,255,0.025); border-radius:14px; margin-bottom:14px; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); transition:border-color .25s, background .25s; overflow:hidden; }
.faq-item.open { border-color:rgba(0,255,255,0.35); background:rgba(0,255,255,0.04); }
.faq-question { display:flex; align-items:center; justify-content:space-between; padding:22px 26px; cursor:none; font-size:15px; font-weight:600; color:var(--white); letter-spacing:.3px; background:none; border:none; width:100%; text-align:left; font-family:inherit; }
.faq-question .faq-icon { width:24px; height:24px; flex-shrink:0; position:relative; transition:transform .3s; }
.faq-question .faq-icon::before,
.faq-question .faq-icon::after { content:''; position:absolute; top:50%; left:50%; background:var(--electric); border-radius:2px; transform:translate(-50%,-50%); }
.faq-question .faq-icon::before { width:14px; height:2px; }
.faq-question .faq-icon::after  { width:2px; height:14px; transition:opacity .3s; }
.faq-item.open .faq-question .faq-icon::after { opacity:0; }
.faq-answer { max-height:0; overflow:hidden; transition:max-height .35s ease; }
.faq-answer-inner { padding:0 26px 22px; color:rgba(245,247,250,0.65); font-size:14px; line-height:1.75; }
.faq-item.open .faq-answer { max-height:400px; }


.pricing-grid { display:grid; grid-template-columns:repeat(3, minmax(0, 1fr)); gap:28px; align-items:stretch; }
.pricing-card-wrap { perspective:1200px; }
.pricing-card { position:relative; height:100%; min-height:420px; padding:32px 28px; border-radius:24px; border:1px solid rgba(0,255,255,0.14); background:linear-gradient(180deg, rgba(10,20,38,0.84) 0%, rgba(4,12,28,0.92) 100%); box-shadow:0 20px 60px rgba(0,0,0,0.35); backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px); transform-style:preserve-3d; transition:transform .14s ease-out, box-shadow .2s ease, border-color .2s ease; will-change:transform; overflow:hidden; display:flex; flex-direction:column; }
.pricing-card::before { content:''; position:absolute; inset:-30% auto auto -20%; width:180px; height:180px; background:radial-gradient(circle, rgba(0,255,255,0.16), transparent 70%); pointer-events:none; }
.pricing-card:hover { border-color:rgba(0,255,255,0.32); box-shadow:0 26px 80px rgba(0,0,0,0.42), 0 0 32px rgba(0,255,255,0.08); }
.pricing-badge { display:inline-flex; align-items:center; gap:10px; padding:10px 16px; border-radius:999px; border:1px solid rgba(0,255,255,0.18); background:rgba(255,255,255,0.04); color:var(--white); font-size:14px; font-weight:700; letter-spacing:.4px; margin-bottom:24px; align-self:flex-start; }
.pricing-price { font-family:'DM Serif Display',serif; font-size:clamp(34px, 4vw, 48px); line-height:1; color:var(--white); margin-bottom:20px; }
.pricing-price span { display:block; margin-top:8px; font-family:'Montserrat',sans-serif; font-size:13px; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:rgba(245,247,250,0.58); }
.pricing-features { list-style:none; padding:0; margin:0 0 24px; }
.pricing-features li { position:relative; padding:0 0 0 26px; margin-bottom:14px; font-size:15px; line-height:1.65; color:rgba(245,247,250,0.78); }
.pricing-features li::before { content:''; position:absolute; left:0; top:9px; width:12px; height:7px; border-left:2px solid var(--electric); border-bottom:2px solid var(--electric); transform:rotate(-45deg); }
.pricing-note { margin-top:auto; font-size:14px; line-height:1.75; color:rgba(245,247,250,0.72); padding-top:18px; border-top:1px solid rgba(0,255,255,0.12); }
.pricing-disclaimer { max-width:880px; margin:36px auto 0; padding:26px 30px; border-radius:18px; border:1px solid rgba(0,255,255,0.12); background:rgba(255,255,255,0.03); color:rgba(245,247,250,0.72); font-size:15px; line-height:1.8; text-align:center; }
.pricing-disclaimer strong { color:var(--white); }
@media (max-width:980px) { .pricing-grid { grid-template-columns:1fr; } .pricing-card { min-height:auto; } }


#contact { background:#04091a; z-index:20; }
#contact .section-inner { padding-bottom:80px; text-align:center; }
.contact-card { background:rgba(255,255,255,0.04); border:1px solid rgba(0,255,255,0.14); border-radius:24px; padding:54px 44px; max-width:760px; margin:0 auto; text-align:left; }
.contact-card .section-title { margin-bottom:14px; text-align:left; }
.contact-card .section-label { text-align:left; }
.contact-card .lead { color:rgba(245,247,250,0.65); font-size:15px; line-height:1.7; margin-bottom:36px; text-align:left; }
.btn-cta { display:inline-block; background:linear-gradient(135deg,#0abde3,#007baf); color:#fff; font-family:'Montserrat',sans-serif; font-weight:700; font-size:15px; letter-spacing:1px; padding:16px 44px; border-radius:50px; text-decoration:none; border:none; cursor:none; box-shadow:0 4px 30px rgba(10,189,227,0.35); transition:opacity .2s,transform .2s; }
.btn-cta:hover { opacity:.88; transform:translateY(-2px); }
.btn-cta:disabled { opacity:.55; cursor:not-allowed; transform:none; }

.contact-form { display:grid; grid-template-columns:1fr 1fr; gap:18px 20px; }
.form-field { display:flex; flex-direction:column; }
.form-field.full { grid-column:1 / -1; }
.form-field label { font-size:12px; font-weight:700; letter-spacing:1.5px; text-transform:uppercase; color:rgba(245,247,250,0.85); margin-bottom:8px; }
.form-field label .req { color:var(--electric); margin-left:4px; }
.form-field input,
.form-field textarea,
.form-field select {
  background:rgba(1,11,24,0.55);
  border:1px solid rgba(0,255,255,0.18);
  border-radius:10px;
  padding:13px 14px;
  color:var(--white);
  font-family:'Montserrat',sans-serif;
  font-size:14px;
  transition:border-color .2s, box-shadow .2s, background .2s;
  outline:none;
  width:100%;
}
.form-field textarea { resize:vertical; min-height:130px; line-height:1.55; }
.form-field input::placeholder,
.form-field textarea::placeholder { color:rgba(245,247,250,0.32); }
.form-field input:focus,
.form-field textarea:focus,
.form-field select:focus { border-color:var(--electric); box-shadow:0 0 0 3px rgba(0,255,255,0.12); background:rgba(1,11,24,0.75); }
.phone-row { display:grid; grid-template-columns:120px 1fr; gap:8px; }
.phone-row select { padding-right:6px; }
.form-actions { grid-column:1 / -1; display:flex; align-items:center; justify-content:flex-start; gap:18px; margin-top:8px; flex-wrap:wrap; }
.form-status { font-size:13px; color:rgba(245,247,250,0.7); }
.form-status.ok  { color:var(--electric); }
.form-status.err { color:#ff6b6b; }

@media (max-width:680px) {
  .contact-card { padding:38px 22px; }
  .contact-form { grid-template-columns:1fr; }
  .phone-row    { grid-template-columns:110px 1fr; }
  #navbar { padding:16px 16px; }
  .nav-pill { height:44px; padding:0 16px; }
  .lang-trigger { height:44px; padding:0 16px; }
}

footer { position:relative; z-index:20; background:#010b18; text-align:center; padding:24px; font-size:12px; color:rgba(245,247,250,0.25); letter-spacing:1px; border-top:1px solid rgba(0,255,255,0.06); }


@media (hover: none) {
  body { cursor: auto; }
  #cursor { display:none; }
  .lang-trigger, .lang-menu button, .btn-cta, .faq-question { cursor: pointer; }
}

</style>
</head>
<body>
<canvas id="bg-matrix-canvas"></canvas>
<div id="bg-spotlight"></div>
<div id="bg-plexus"></div>
<div id="bg-scanlines"></div>
<div id="bg-vignette"></div>
<div id="cursor"><div id="cursor-dot"></div><div id="cursor-ring"></div></div>

/* ═══ HEADER SCROLL BEHAVIOR — hide on scroll down, show on scroll up (identique à index.html) ═══ */
(function () {
  const header = document.getElementById('navbar');
  if (!header) return;
  const REVEAL_THRESHOLD = 80; // toujours visible tant qu'on est proche du haut
  let lastY = window.scrollY;
  let ticking = false;

  function update() {
    const y = window.scrollY;
    if (y <= REVEAL_THRESHOLD) {
      header.classList.remove('nav-hidden');
    } else if (y > lastY) {
      header.classList.add('nav-hidden');
    } else if (y < lastY) {
      header.classList.remove('nav-hidden');
    }
    lastY = y;
    ticking = false;
  }

  window.addEventListener('scroll', function () {
    if (!ticking) {
      window.requestAnimationFrame(update);
      ticking = true;
    }
  }, { passive: true });
})();
</script>

const AVAILABLE = LANGS.map(l => l.code);

function detectLang() {
  const saved = localStorage.getItem('lang');
  if (saved && AVAILABLE.includes(saved)) return saved;
  const nav = (navigator.language || 'en').slice(0,2).toLowerCase();
  return AVAILABLE.includes(nav) ? nav : 'en';
}

let currentLang = detectLang();

function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function mockupHtml(i){
  const m = PORTFOLIO_MEDIA[i];
  const startAt = m.startAt || 4;
  const vid = (src) => `<video class="mk-video" muted loop playsinline preload="auto" data-start="${startAt}" data-src="${src}"></video>`;
  const scr = (src) => `<div class="scroll-frame"><img class="scroll-img" src="${src}" alt="" loading="lazy"/></div>`;
  const desktopInner = m.desktopMp4 ? vid(m.desktopMp4) : (m.scrollDesktop ? scr(m.scrollDesktop) : `<div class="fill" style="background:${m.placeholderTint||'#0a1828'}"></div>`);
  const phoneInner   = m.mobileMp4  ? vid(m.mobileMp4)  : (m.scrollMobile  ? scr(m.scrollMobile)  : `<div class="fill" style="background:${m.placeholderTint||'#0a1828'}"></div>`);
  return `<div class="portfolio-mockup" data-portfolio-mockup>
    <div class="mockup-pc"><div class="mockup-pc-screen">${desktopInner}</div><div class="mockup-pc-stand"></div></div>
    <div class="mockup-phone"><div class="mockup-phone-screen">${phoneInner}</div></div>
  </div>`;
}

    <div class="divider"></div>

      <div class="faq-list">${faqItems}</div>
    </div></section>
    <div class="divider"></div>
    <section id="pricing"><div class="section-inner">
      <div style="text-align:center;margin-bottom:56px">
        <div class="section-label">${escapeHtml(t.pricing.label)}</div>
        <div class="section-title" style="margin-bottom:0">${escapeHtml(t.pricing.title)}</div>
      </div>
      <div class="pricing-grid">${pricingCards}</div>
      <div class="pricing-disclaimer"><strong>${escapeHtml(t.pricing.disclaimerTitle)}</strong><br>${escapeHtml(t.pricing.disclaimerBody)}</div>
    </div></section>
    <div class="divider"></div>
    <section id="contact"><div class="section-inner">
      <div class="contact-card">
        <div class="section-label">${escapeHtml(t.contact.label)}</div>

function renderLangMenu(){
  const menu = document.getElementById('langMenu');
  menu.innerHTML = LANGS.map(l=>`
    <li><button type="button" data-lang="${l.code}" class="${l.code===currentLang?'active':''}">
      <span>${l.flag} ${l.label}</span><span class="check">✓</span>
    </button></li>`).join('');
  document.getElementById('langCurrent').textContent = currentLang.toUpperCase();
  menu.querySelectorAll('button').forEach(b=>{
    b.addEventListener('click',()=>{
      currentLang = b.getAttribute('data-lang');
      localStorage.setItem('lang', currentLang);
      document.getElementById('langSwitcher').classList.remove('open');
      document.getElementById('langTrigger').setAttribute('aria-expanded','false');
      renderLangMenu(); renderApp();
    });
  });
}

document.getElementById('langTrigger').addEventListener('click',()=>{
  const sw = document.getElementById('langSwitcher');
  const open = sw.classList.toggle('open');
  document.getElementById('langTrigger').setAttribute('aria-expanded', open?'true':'false');
});
document.addEventListener('click',e=>{
  const sw = document.getElementById('langSwitcher');
  if (!sw.contains(e.target)){ sw.classList.remove('open'); document.getElementById('langTrigger').setAttribute('aria-expanded','false'); }
});

renderLangMenu();
renderApp();

(function () {

  renderer.domElement.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;';
  container.appendChild(renderer.domElement);

  const scene  = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, .1, 1000);
  camera.position.z = 120;

  function makeBlobSprite(colHex, radius) {
    const size=256; const cv=document.createElement('canvas'); cv.width=cv.height=size;
    const c=cv.getContext('2d');
    const grd=c.createRadialGradient(size/2,size/2,0,size/2,size/2,size/2);
    grd.addColorStop(0, colHex.replace(')' ,',0.18)').replace('rgb','rgba'));

  }
  const blob1=makeBlobSprite('rgb(0,180,255)',180);  blob1.position.set(55,-20,-30);  scene.add(blob1);
  const blob2=makeBlobSprite('rgb(200,160,90)',150); blob2.position.set(-30,25,-20);  scene.add(blob2);
  const blob3=makeBlobSprite('rgb(0,220,200)',120);  blob3.position.set(20,-40,-10);  scene.add(blob3);

  const COUNT=1000,CONNECT_DIST=28,REPEL_DIST=20,REPEL_FORCE=0.016,SX=155,SY=85;
  const positions=new Float32Array(COUNT*3),colors=new Float32Array(COUNT*3),sizes=new Float32Array(COUNT);
  const vel=[],base=[],phase=[],colorGroup=[];

  for(let i=0;i<COUNT;i++){
    const x=(Math.random()-.5)*SX*2,y=(Math.random()-.5)*SY*2,z=(Math.random()-.5)*35;
    positions[i*3]=x;positions[i*3+1]=y;positions[i*3+2]=z;
    base.push(new THREE.Vector3(x,y,z));
    vel.push(new THREE.Vector3((Math.random()-.5)*.08,(Math.random()-.5)*.08,(Math.random()-.5)*.04));
    phase.push(Math.random()*Math.PI*2);
    const g=Math.random()<.55?0:Math.random()<.7?1:Math.random()<.5?2:3; colorGroup.push(g);
    let r,g2,b;
    if(g===0){r=0;g2=.7;b=1;}else if(g===1){r=.88;g2=.75;b=.52;}else if(g===2){r=.7;g2=.7;b=.7;}else{r=.55;g2=0;b=.9;}
    colors[i*3]=r;colors[i*3+1]=g2;colors[i*3+2]=b;
    sizes[i]=1.2+Math.random()*1.8;
  }

  const vShader=`attribute float size;attribute vec3 color;varying vec3 vColor;varying float vAlpha;uniform float uTime;
    void main(){vColor=color;vec3 p=position;p.y+=sin(uTime*.0008+position.x*.04)*.6;p.x+=cos(uTime*.0006+position.y*.03)*.4;
    vAlpha=(0.55+0.3*sin(uTime*.001+position.z*.1))*1.12;gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);
    gl_PointSize=size*(280.0/(-modelViewMatrix*vec4(p,1.0)).z);}`;
  const fShader=`varying vec3 vColor;varying float vAlpha;
    void main(){float d=distance(gl_PointCoord,vec2(.5));if(d>0.5)discard;
    float a=smoothstep(0.5,0.15,d)*vAlpha;gl_FragColor=vec4(vColor,a);}`;

  const geo=new THREE.BufferGeometry();
  geo.setAttribute('position',new THREE.BufferAttribute(positions,3).setUsage(THREE.DynamicDrawUsage));
  geo.setAttribute('color',new THREE.BufferAttribute(colors,3));
  geo.setAttribute('size',new THREE.BufferAttribute(sizes,1));
  const pMat=new THREE.ShaderMaterial({vertexShader:vShader,fragmentShader:fShader,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,uniforms:{uTime:{value:0}}});
  scene.add(new THREE.Points(geo,pMat));

  const MAX_LINES=2800;
  const lPos=new Float32Array(MAX_LINES*6),lCol=new Float32Array(MAX_LINES*6);
  const lGeo=new THREE.BufferGeometry();
  lGeo.setAttribute('position',new THREE.BufferAttribute(lPos,3).setUsage(THREE.DynamicDrawUsage));
  lGeo.setAttribute('color',new THREE.BufferAttribute(lCol,3).setUsage(THREE.DynamicDrawUsage));
  const lMat=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,opacity:.8,depthWrite:false,blending:THREE.AdditiveBlending});
  scene.add(new THREE.LineSegments(lGeo,lMat));

  const BURST_COUNT=80;const bPos=new Float32Array(BURST_COUNT*3);const bVel=[];
  for(let i=0;i<BURST_COUNT;i++){bPos[i*3]=(Math.random()-.5)*SX*2;bPos[i*3+1]=(Math.random()-.5)*SY*2;bPos[i*3+2]=(Math.random()-.5)*10;bVel.push(new THREE.Vector3((Math.random()-.5)*.12,(Math.random()-.5)*.12,0));}
  const burstGeo=new THREE.BufferGeometry();
  burstGeo.setAttribute('position',new THREE.BufferAttribute(bPos,3).setUsage(THREE.DynamicDrawUsage));
  const bvShader=`attribute float size;uniform float uTime;void main(){vec3 p=position;gl_Position=projectionMatrix*modelViewMatrix*vec4(p,1.0);gl_PointSize=2.0*(280.0/(-modelViewMatrix*vec4(p,1.0)).z);}`;
  const bfShader=`void main(){float d=distance(gl_PointCoord,vec2(.5));if(d>0.5)discard;gl_FragColor=vec4(0.,.75,.95,0.35*(1.-d*2.));}`;
  const burstMat=new THREE.ShaderMaterial({vertexShader:bvShader,fragmentShader:bfShader,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending,uniforms:{uTime:{value:0}}});
  scene.add(new THREE.Points(burstGeo,burstMat));

  const STAR_COUNT=22;const starData=[];
  function resetStar(s){s.x=(Math.random()-.5)*SX*2;s.y=(Math.random()-.4)*SY*2;s.z=(Math.random()-.5)*10;
    const angle=Math.PI*(1.05+Math.random()*.9);const spd=.9+Math.random()*1.8;

  for(let i=0;i<STAR_COUNT;i++){
    const sg=new THREE.BufferGeometry();const sp=new Float32Array(6);const sc=new Float32Array(6);
    sg.setAttribute('position',new THREE.BufferAttribute(sp,3).setUsage(THREE.DynamicDrawUsage));

    const sm=new THREE.LineBasicMaterial({vertexColors:true,transparent:true,depthWrite:false,blending:THREE.AdditiveBlending});

  const mouse3D=new THREE.Vector3(9999,9999,0);

  function onPointer(px,py){

  window.addEventListener('touchstart',e=>onPointer(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  window.addEventListener('touchmove', e=>onPointer(e.touches[0].clientX,e.touches[0].clientY),{passive:true});
  window.addEventListener('resize',()=>{renderer.setSize(window.innerWidth,window.innerHeight);camera.aspect=window.innerWidth/window.innerHeight;camera.updateProjectionMatrix();});

  let lc=0;

    requestAnimationFrame(animate);const T=t*.001;
    pMat.uniforms.uTime.value=T;burstMat.uniforms.uTime.value=T;
    for(let i=0;i<COUNT;i++){const ix=i*3;
      const ax=positions[ix],ay=positions[ix+1],az=positions[ix+2];
      vel[i].y+=Math.sin(T*.0005+phase[i])*.0025;
      const dx=ax-mouse3D.x,dy=ay-mouse3D.y,dz=az-mouse3D.z;
      const dm=Math.sqrt(dx*dx+dy*dy+dz*dz);
      if(dm<REPEL_DIST){const f=(REPEL_DIST-dm)/REPEL_DIST*REPEL_FORCE;vel[i].x+=dx/dm*f;vel[i].y+=dy/dm*f;}

    lc=0;
    for(let i=0;i<COUNT&&lc<MAX_LINES;i++){const ax=positions[i*3],ay=positions[i*3+1],az=positions[i*3+2];
      for(let j=i+1;j<COUNT&&lc<MAX_LINES;j++){const bx=positions[j*3],by=positions[j*3+1],bz=positions[j*3+2];
        const d=Math.sqrt((ax-bx)**2+(ay-by)**2+(az-bz)**2);
        if(d<CONNECT_DIST){const ba=1-d/CONNECT_DIST;const mx2=(ax+bx)*.5-mouse3D.x,my2=(ay+by)*.5-mouse3D.y;
          const mb=Math.max(0,1-Math.sqrt(mx2*mx2+my2*my2)/30);const a=Math.min(.85,ba*.45+mb*.55);const lo=lc*6;
          lPos[lo]=ax;lPos[lo+1]=ay;lPos[lo+2]=az;lPos[lo+3]=bx;lPos[lo+4]=by;lPos[lo+5]=bz;

          if(g===0){lr=mb*.05;lg=.5+mb*.4;lb=.9+mb*.1;}else if(g===1){lr=.88+mb*.08;lg=.75+mb*.1;lb=.5+mb*.1;}
          else if(g===3){lr=.45+mb*.2;lg=0;lb=.7+mb*.2;}else{const v=.5+mb*.25;lr=v;lg=v;lb=v;}
          lCol[lo]=lr*a;lCol[lo+1]=lg*a;lCol[lo+2]=lb*a;lCol[lo+3]=lr*a;lCol[lo+4]=lg*a;lCol[lo+5]=lb*a;lc++;}}}
    lGeo.attributes.position.needsUpdate=true;lGeo.attributes.color.needsUpdate=true;lGeo.setDrawRange(0,lc*2);
    for(let i=0;i<BURST_COUNT;i++){bPos[i*3]+=bVel[i].x;bPos[i*3+1]+=bVel[i].y;
      if(Math.abs(bPos[i*3])>SX)bVel[i].x*=-1;if(Math.abs(bPos[i*3+1])>SY)bVel[i].y*=-1;}

      s.posArr[0]=s.x;s.posArr[1]=s.y;s.posArr[2]=s.z;
      s.posArr[3]=s.x-s.vx*(s.len/Math.max(Math.abs(s.vx),.01));

      else if(s.beige){s.colArr[0]=.9;s.colArr[1]=.78;s.colArr[2]=.52;s.colArr[3]=.18;s.colArr[4]=.14;s.colArr[5]=.08;}
      else{s.colArr[0]=.55;s.colArr[1]=0;s.colArr[2]=.9;s.colArr[3]=.1;s.colArr[4]=0;s.colArr[5]=.2;}
      for(let k=0;k<6;k++)s.colArr[k]*=a;
      s.geo.attributes.position.needsUpdate=true;s.geo.attributes.color.needsUpdate=true;s.mat.opacity=1;
      if(s.x>SX+20||s.x<-SX-20||s.y>SY+20||s.y<-SY-20)resetStar(s);}
    blob1.material.opacity=.55+Math.sin(T*.6)*.12;
    blob2.material.opacity=.45+Math.sin(T*.4+1)*.12;
    blob3.material.opacity=.5+Math.sin(T*.5+2)*.10;

    cursorDot.style.left=(cx-rx)+'px';cursorDot.style.top=(cy-ry)+'px';
    camera.position.x+=((ms.x/window.innerWidth-.5)*5-camera.position.x)*.007;

<script>
(function(){
  var IDS=['hero','portfolio','faq','pricing','contact'];
  var nav=document.getElementById('wsSpy'); if(!nav) return;
  var btns={};
  nav.querySelectorAll('button[data-target]').forEach(function(b){btns[b.dataset.target]=b;});
  var reduced=window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // --- i18n pour le scrollspy (aligné sur les langues du site) ---
  var SPY_I18N={
    fr:{nav:"Navigation des sections",go:"Aller à ",labels:{hero:"Accueil",portfolio:"Portfolio",faq:"FAQ",pricing:"Tarifs",contact:"Contact"}},
    en:{nav:"Section navigation",go:"Go to ",labels:{hero:"Home",portfolio:"Portfolio",faq:"FAQ",pricing:"Pricing",contact:"Contact"}},
    de:{nav:"Abschnittsnavigation",go:"Gehe zu ",labels:{hero:"Start",portfolio:"Portfolio",faq:"FAQ",pricing:"Preise",contact:"Kontakt"}},
    es:{nav:"Navegación de secciones",go:"Ir a ",labels:{hero:"Inicio",portfolio:"Portfolio",faq:"FAQ",pricing:"Precios",contact:"Contacto"}},
    it:{nav:"Navigazione delle sezioni",go:"Vai a ",labels:{hero:"Home",portfolio:"Portfolio",faq:"FAQ",pricing:"Prezzi",contact:"Contatti"}}
  };
  function applySpyLabels(lang){
    var dict=SPY_I18N[lang]||SPY_I18N.fr;
    nav.setAttribute('aria-label',dict.nav);
    IDS.forEach(function(id){
      var b=btns[id]; if(!b) return;
      var lbl=b.querySelector('.lbl');
      var text=dict.labels[id];
      if(lbl && text) lbl.textContent=text;
      if(text) b.setAttribute('aria-label',dict.go+text);
    });
  }
  window.wsSpyUpdateLabels=applySpyLabels;
  // Applique la langue déjà active au chargement (currentLang vient du script principal)
  applySpyLabels(typeof currentLang!=='undefined'?currentLang:'fr');
  function setActive(id){IDS.forEach(function(k){if(btns[k]) btns[k].classList.toggle('is-active',k===id);});}
  nav.querySelectorAll('button[data-target]').forEach(function(b){
    b.addEventListener('click',function(){
      var el=document.getElementById(b.dataset.target); if(!el) return;
      el.scrollIntoView({behavior:reduced?'auto':'smooth',block:'start'});
      setActive(b.dataset.target);
    });
  });
  function mount(){
    var visibility=new Map(); var current=null;
    var io=new IntersectionObserver(function(entries){
      entries.forEach(function(e){visibility.set(e.target.id,e.isIntersecting?e.intersectionRatio:0);});
      var bestId=current,best=-1;
      visibility.forEach(function(r,id){if(r>best){best=r;bestId=id;}});
      if(best>0&&bestId!==current){current=bestId;setActive(bestId);}
    },{rootMargin:'-35% 0px -55% 0px',threshold:[0,.25,.5,.75,1]});
    var found=0;
    IDS.forEach(function(id){var el=document.getElementById(id); if(el){io.observe(el);found++;}});
    if(found>0) requestAnimationFrame(function(){nav.classList.add('is-ready');});
  }
  var app=document.getElementById('app');
  if(app && IDS.every(function(id){return !document.getElementById(id);})){
    var mo=new MutationObserver(function(){
      if(IDS.some(function(id){return document.getElementById(id);})){mo.disconnect();mount();}
    });
    mo.observe(app,{childList:true,subtree:true});
    setTimeout(function(){try{mo.disconnect();}catch(e){} mount();},4000);
  } else { mount(); }
})();
</script>

<script>
/* WebStudio — portfolio runtime: lazy video load, in-viewport play/pause, scroll-frame animation sync */
(function(){
  const mounted = new WeakSet();
  const videoSrcLoaded = new WeakSet();
  function loadVideoSrc(v){
    if (videoSrcLoaded.has(v)) return;
    const src = v.getAttribute('data-src');
    if (src && !v.querySelector('source')) {
      const s = document.createElement('source');
      s.src = src; s.type = 'video/mp4';
      v.appendChild(s);
      v.load();
    }
    videoSrcLoaded.add(v);
  }
  // Preload observer: starts fetching a video's actual file only once its
  // mockup is close to the viewport (large rootMargin), not the instant
  // the portfolio section is rendered.
  const preloadIO = new IntersectionObserver((entries) => {
    entries.forEach(en => {
      if (!en.isIntersecting) return;
      en.target.querySelectorAll('video.mk-video').forEach(loadVideoSrc);
      preloadIO.unobserve(en.target);
    });
  }, { rootMargin: '600px 0px' });
  function setup(root){
    const mocks = (root||document).querySelectorAll('[data-portfolio-mockup]');
    mocks.forEach(m => {
      if (mounted.has(m)) return; mounted.add(m);
      // videos: attach listeners now, but defer fetching the actual file
      // (source + load()) until the mockup is about to enter the viewport,
      // so off-screen case studies never download video data.
      m.querySelectorAll('video.mk-video').forEach(v => {
        v.addEventListener('loadeddata', () => { v.classList.add('ready'); }, { once:true });
        v.addEventListener('error', () => { v.classList.add('ready'); });
      });
      // scroll-frames: compute translate range once image is loaded
      m.querySelectorAll('.scroll-frame').forEach(frame => {
        const img = frame.querySelector('.scroll-img');
        if (!img) return;
        const compute = () => {
          const fh = frame.clientHeight;
          const iw = img.naturalWidth || img.clientWidth;
          const ih = img.naturalHeight || img.clientHeight;
          if (!iw || !ih || !fh) return;
          const scaledH = (frame.clientWidth / iw) * ih;
          const max = fh - scaledH; // negative
          img.style.setProperty('--scroll-max', max + 'px');
          img.classList.add('play');
        };
        if (img.complete) compute(); else img.addEventListener('load', compute, { once:true });
        window.addEventListener('resize', () => { requestAnimationFrame(compute); }, { passive:true });
      });
    });

    // IntersectionObserver
    // Attempts to play a video; if the browser doesn't yet have enough data
    // buffered, retries automatically as soon as it does, instead of failing
    // silently until the page is refreshed.
    const tryPlay = (v) => {
      const p = v.play();
      if (p && p.catch) {
        p.catch(()=>{
          v.addEventListener('canplay', () => {
            if (v.dataset.wantsPlay === '1') {
              const p2 = v.play();
              if (p2 && p2.catch) p2.catch(()=>{});
            }
          }, { once:true });
        });
      }
    };
    const io = new IntersectionObserver((entries) => {
      entries.forEach(en => {
        const mockup = en.target;
        const visible = en.isIntersecting && en.intersectionRatio > 0.15;
        mockup.querySelectorAll('video.mk-video').forEach(v => {
          if (visible) { v.dataset.wantsPlay = '1'; tryPlay(v); }
          else { v.dataset.wantsPlay = '0'; v.pause(); }
        });
        mockup.querySelectorAll('.scroll-img').forEach(img => {
          img.classList.toggle('paused', !visible);
        });
      });
    }, { threshold:[0, 0.15, 0.35, 0.6] });
    mocks.forEach(m => { io.observe(m); preloadIO.observe(m); });

    // Safety net: right after the mockups are injected, fonts/images can
    // still be loading and shift the layout, which sometimes makes the
    // observer miss a video that is actually on-screen. Re-check a few
    // times as the page settles so playback starts without needing a
    // manual refresh.
    const recheckVisible = () => {
      mocks.forEach(m => {
        m.querySelectorAll('video.mk-video').forEach(v => {
          const r = v.getBoundingClientRect();
          const inView = r.top < window.innerHeight * 0.85 && r.bottom > window.innerHeight * 0.15;
          if (inView && v.paused) { v.dataset.wantsPlay = '1'; tryPlay(v); }
        });
      });
    };
    window.addEventListener('load', recheckVisible, { once:true });
    setTimeout(recheckVisible, 800);
    setTimeout(recheckVisible, 2000);
  }

  // Wait for renderApp to inject portfolio DOM, then wire up. Re-run on language change.
  const boot = () => {
    if (!document.getElementById('app')) return;
    setup(document);
  };
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', boot);
  } else {
    boot();
  }
  // Observe app for re-renders (language switch reflows innerHTML)
  const appObs = new MutationObserver(() => { setup(document); });
  const start = () => {
    const app = document.getElementById('app');
    if (app) appObs.observe(app, { childList:true, subtree:false });
    else setTimeout(start, 200);
  };
  start();
})();
</script>
</body>
</html>
